<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr_Renzaku</title>

<style>

/* ================= الخلفيات المحسنة ================= */

:root{
  --bg-dark:
    radial-gradient(circle at 50% -20%, rgba(255,215,0,0.15), transparent 60%),
    linear-gradient(160deg,#0f2027,#1b2a38,#000814);

  --bg-light:
    radial-gradient(circle at top, rgba(255,200,0,0.15), transparent 55%),
    linear-gradient(160deg,#fffdf7,#ffeacc);

  --glass-dark: rgba(255,255,255,0.06);
  --glass-light: rgba(255,255,255,0.85);
  --text-dark:#ffffff;
  --text-light:#1f1f1f;
  --accent:linear-gradient(45deg,#ffd700,#ffb300);
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg-dark);
  color:var(--text-dark);
  transition:.4s ease;
}

body.light{
  background:var(--bg-light);
  color:var(--text-light);
}

/* ================= الفوانيس ================= */

.lantern{
  position:fixed;
  top:0;
  width:45px;
  height:65px;
  background:var(--accent);
  border-radius:12px;
  box-shadow:0 0 35px rgba(255,200,0,.8);
  animation:swing 3s infinite alternate ease-in-out;
  z-index:0;
}

.l1{left:15%}
.l2{left:45%;animation-delay:1s}
.l3{left:75%;animation-delay:2s}

@keyframes swing{
  from{transform:rotate(-6deg)}
  to{transform:rotate(6deg)}
}

/* ================= الهيدر ================= */

header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  position:relative;
  z-index:1;
}

/* ================= الكروت ================= */

.container{
  padding:20px;
  position:relative;
  z-index:1;
}

.card{
  display:flex;
  align-items:center;
  gap:15px;
  padding:18px;
  margin-bottom:20px;
  border-radius:25px;
  background:var(--glass-dark);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,.15);
  cursor:pointer;
  transition:.3s;
}

body.light .card{
  background:var(--glass-light);
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:70px;
  height:70px;
  border-radius:20px;
}

/* ================= صفحة التفاصيل ================= */

.details-page{
  display:none;
  padding:20px;
  position:relative;
  z-index:1;
}

.glass{
  max-width:500px;
  margin:40px auto;
  padding:30px;
  border-radius:35px;
  background:var(--glass-dark);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.2);
  text-align:center;
}

body.light .glass{
  background:var(--glass-light);
}

.install-btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 35px;
  border-radius:50px;
  background:var(--accent);
  color:black;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 8px 25px rgba(255,215,0,.4);
}

/* ================= زر الإعدادات ================= */

.settings-wrapper{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 15px;
  border-radius:20px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.3);
  cursor:pointer;
  z-index:2;
}

/* ================= نافذة الإعدادات ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3;
}

.modal-content{
  width:340px;
  padding:25px;
  border-radius:25px;
  background:var(--glass-dark);
  backdrop-filter:blur(30px);
  position:relative;
}

body.light .modal-content{
  background:var(--glass-light);
}

.close-btn{
  position:absolute;
  top:10px;
  left:15px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
}

.setting-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.1);
}

/* ================= Toggle ================= */

.toggle{
  width:45px;
  height:24px;
  background:#777;
  border-radius:20px;
  position:relative;
  cursor:pointer;
  transition:.3s;
}

.toggle::before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:#fff;
  border-radius:50%;
  top:3px;
  right:4px;
  transition:.3s;
}

.toggle.active{
  background:var(--accent);
}

.toggle.active::before{
  transform:translateX(-20px);
}

/* ================= زر التحديث ================= */

.refresh-btn{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:var(--accent);
  cursor:pointer;
  font-weight:bold;
}

select{
  padding:6px;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="lantern l1"></div>
<div class="lantern l2"></div>
<div class="lantern l3"></div>

<header id="title">🌙 Mr_Renzaku | رمضان كريم</header>

<div class="container" id="homePage"></div>
<div class="details-page" id="detailsPage"></div>

<div class="settings-wrapper" onclick="openSettings()">⚙️</div>

<div class="modal" id="settingsModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeSettings()">✖</span>
    <h3 id="settingsTitle">الإعدادات</h3>

    <div class="setting-item">
      <span id="modeText">التبديل بين الأوضاع</span>
      <div class="toggle" id="darkToggle" onclick="toggleDark()"></div>
    </div>

    <div class="setting-item">
      <span id="effectsText">المؤثرات الرمضانية</span>
      <div class="toggle" id="effectsToggle" onclick="toggleEffects()"></div>
    </div>

    <div class="setting-item">
      <span id="langText">اللغة</span>
      <select onchange="changeLang(this.value)" id="languageSelect">
        <option value="ar">العربية</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="setting-item">
      <span id="refreshText">تحديث الصفحة</span>
      <button class="refresh-btn" onclick="refreshPage()">تحديث</button>
    </div>

  </div>
</div>

<script>

/* ================= التطبيقات ================= */

const apps = [
  {
    name: "GameHub Lite",
    publisher: "Mr_Renzaku Store",
    version: "v5.1.3",
    category: "PS5 game emulator",
    logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRwfHKH3FD20uaxO3O9jklZHP62nc-0GNwH4JtR1NHh3c_97SAfF7VPNc&s=10",
    download: "#"
  }
  ,{
    name: "Yacine TV",
    publisher: "لمشاهدة جميع مباريات كرة القدم",
    version: "2026",
    category: "TV",
    logo: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhacjPqIoS92fxNszDp_QIZgJ2_wksscHZL4X9A_znWHAOKk6y5_3xExmZvOcCK9oFFaZjoJj-8cSFtMyu0wrUK3lgEal-5VCidjOqyX87Oclh7n4JPQtc6RTbys136QsllBPnoaK-JRZkK_6kT-MIJM9CCuqh3neHHGyxiIhoA8kBdPl2CowwEAlrDZQB1/w640-h360/%D8%AA%D8%AD%D9%85%D9%8A%D9%84-%D9%8A%D8%A7%D8%B3%D9%8A%D9%86-%D8%AA%D9%8A%D9%81%D9%8A-Yacine-TV-APK-1%20(1).jpg",
    download: "https://download2389.mediafire.com/zqdhnjadogbgcجههa_AebvOLi2rZotBFgd4KEfJsaq4ai9Ukoa0yXLayPvD0vkGH38HZC6WI78niT4G8omSW1xVu5ZAa3hwqqwnvySAO-Cw2lumhCtqae4rLCV_RtTSEnqowl6yIq3gi1kty0dd7838qcNo4Bb9opMn1Rj8xTHCrwrk/mqpdj2kacuqrrny/Yacine+TV+New-2025.apk"
  }
,{
    name: "Boost DevX",
    publisher: "لتحسين أداء الالعاب علي هاتفك",
    version: "2.0",
    category: "App",
    logo: "https://media.istockphoto.com/id/876037616/vector/rocket-launch-vector-illustration-isolated-on-white.jpg?s=612x612&w=0&k=20&c=BnOXPbM2RyZBSLKLiCJaY_9mkK_1VQ2GuCP-HFFbAX4=",
    download: "https://download2339.mediafire.com/j3f87kgehl8gnyzteTtT0AslRL043YN6MWH8L-rnm8N1YAQgZ6ttqPbfbYZSTIOaZTn6TWq5U9IF2uVoqYIBiivYVoo1bo5Kd5MfL-162mnKW5C18-pucw6KguNz7O4DPXhX8F12-qwLuP1E2O7IhqzWp3w9FlAaMYub9YDiGhg/ehksxg061kb5ias/BoostDevX-2.0.apk"
  }
];
/* ================= عرض التطبيقات ================= */

function renderHome(){
  const container = document.getElementById("homePage");
  container.innerHTML = "";

  apps.forEach((app,index)=>{
    container.innerHTML += `
      <div class="card" onclick="openDetails(${index})">
        <img src="${app.logo}">
        <div>
          <h3>${app.name}</h3>
          <p>${app.publisher}</p>
          <small>${app.category} | ${app.version}</small>
        </div>
      </div>
    `;
  });
}

/* ================= التفاصيل ================= */

function openDetails(index){
  const app = apps[index];
  document.getElementById("homePage").style.display="none";
  const details = document.getElementById("detailsPage");
  details.style.display="block";

  details.innerHTML = `
    <div class="glass">
      <img src="${app.logo}" width="100" style="border-radius:20px;">
      <h2>${app.name}</h2>
      <p>${app.publisher}</p>
      <p>${app.category} | ${app.version}</p>
      <a href="${app.download}" class="install-btn">
        ${currentLang==="ar"?"تثبيت":"Install"}
      </a>
      <p style="margin-top:15px;cursor:pointer" onclick="goBack()">
        ${currentLang==="ar"?"رجوع":"Back"}
      </p>
    </div>
  `;
}

function goBack(){
  document.getElementById("detailsPage").style.display="none";
  document.getElementById("homePage").style.display="block";
}

/* ================= الإعدادات ================= */

function openSettings(){
  document.getElementById("settingsModal").style.display="flex";
}

function closeSettings(){
  document.getElementById("settingsModal").style.display="none";
}

function toggleDark(){
  document.body.classList.toggle("light");
  document.getElementById("darkToggle").classList.toggle("active");
  localStorage.setItem("mode",document.body.classList.contains("light")?"light":"dark");
}

function toggleEffects(){
  const toggle=document.getElementById("effectsToggle");
  toggle.classList.toggle("active");
  const lanterns=document.querySelectorAll(".lantern");

  if(toggle.classList.contains("active")){
    lanterns.forEach(l=>l.style.display="block");
    localStorage.setItem("effects","on");
  }else{
    lanterns.forEach(l=>l.style.display="none");
    localStorage.setItem("effects","off");
  }
}

function refreshPage(){
  location.reload();
}

/* ================= اللغة ================= */

let currentLang="ar";

function changeLang(lang){
  currentLang=lang;
  localStorage.setItem("lang",lang);

  if(lang==="en"){
    document.documentElement.lang="en";
    document.documentElement.dir="ltr";
    document.getElementById("settingsTitle").innerText="Settings";
    document.getElementById("modeText").innerText="Toggle Mode";
    document.getElementById("effectsText").innerText="Ramadan Effects";
    document.getElementById("langText").innerText="Language";
    document.getElementById("refreshText").innerText="Refresh Page";
    document.querySelector(".refresh-btn").innerText="Refresh";
    document.getElementById("title").innerText="🌙 Mr_Renzaku | Ramadan Kareem";
  }else{
    document.documentElement.lang="ar";
    document.documentElement.dir="rtl";
    document.getElementById("settingsTitle").innerText="الإعدادات";
    document.getElementById("modeText").innerText="التبديل بين الأوضاع";
    document.getElementById("effectsText").innerText="المؤثرات الرمضانية";
    document.getElementById("langText").innerText="اللغة";
    document.getElementById("refreshText").innerText="تحديث الصفحة";
    document.querySelector(".refresh-btn").innerText="تحديث";
    document.getElementById("title").innerText="🌙 Mr_Renzaku | رمضان كريم";
  }
}

/* ================= تحميل الإعدادات ================= */

window.onload=function(){

  renderHome();

  if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
    document.getElementById("darkToggle").classList.add("active");
  }

  if(localStorage.getItem("effects")==="on"){
    document.getElementById("effectsToggle").classList.add("active");
  }else{
    document.querySelectorAll(".lantern").forEach(l=>l.style.display="none");
  }

  if(localStorage.getItem("lang")){
    changeLang(localStorage.getItem("lang"));
    document.getElementById("languageSelect").value=localStorage.getItem("lang");
  }

};

</script>

</body>
</html>
